<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Šolski App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; }
    nav { background: #1a1a2e; color: #fff; padding: 0.8rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
    nav .brand { font-weight: 700; font-size: 1.1rem; }
    nav a, nav button { color: #ccc; text-decoration: none; cursor: pointer; background: none; border: none; font-size: 0.95rem; padding: 0.3rem 0.5rem; }
    nav a:hover, nav button:hover { color: #fff; }
    nav a.active { color: #fff; border-bottom: 2px solid #4a6cf7; }
    nav .spacer { flex: 1; }
    nav .user-info { font-size: 0.85rem; color: #aaa; }
    .container { max-width: 1200px; margin: 1.5rem auto; padding: 0 1rem; }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1.5rem; }
    .card h2 { font-size: 1.2rem; margin-bottom: 1rem; }
    .filters { display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: end; margin-bottom: 1rem; }
    .filters label { font-size: 0.85rem; font-weight: 500; color: #555; display: block; margin-bottom: 0.2rem; }
    .filters select, .filters input { padding: 0.5rem 0.7rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
    .filters select:focus, .filters input:focus { outline: none; border-color: #4a6cf7; }
    .btn { padding: 0.5rem 1rem; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 0.3rem; }
    .btn-primary { background: #4a6cf7; color: #fff; }
    .btn-primary:hover { background: #3a5ce5; }
    .btn-danger { background: #dc3545; color: #fff; font-size: 0.75rem; padding: 0.25rem 0.5rem; }
    .btn-danger:hover { background: #c82333; }
    .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }
    .btn-success { background: #28a745; color: #fff; }
    .btn-success:hover { background: #218838; }
    .btn-outline { background: transparent; border: 1px solid #4a6cf7; color: #4a6cf7; }
    .btn-outline:hover { background: #4a6cf7; color: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th, td { padding: 0.5rem; text-align: center; border: 1px solid #e0e0e0; }
    th { background: #f8f9fa; font-weight: 600; color: #555; font-size: 0.82rem; }
    td { min-height: 40px; vertical-align: middle; }
    .slot-free { color: #28a745; font-size: 0.8rem; }
    .slot-taken { font-size: 0.8rem; }
    .slot-taken .razred { font-weight: 600; }
    .slot-info { font-size: 0.75rem; color: #666; }
    .rez-label { font-weight: 600; font-size: 0.85rem; }
    .rez-teacher { font-size: 0.7rem; color: #666; }
    .prostor-tabs { display: flex; gap: 0; margin-bottom: 1rem; }
    .prostor-tab { padding: 0.5rem 1.2rem; border: 1px solid #ddd; background: #f8f9fa; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    .prostor-tab:first-child { border-radius: 8px 0 0 8px; }
    .prostor-tab:last-child { border-radius: 0 8px 8px 0; }
    .prostor-tab.active { background: #4a6cf7; color: #fff; border-color: #4a6cf7; }
    .prostor-tab:not(.active):hover { background: #e9ecef; }
    .prostor-view { display: none; }
    .prostor-view.active { display: block; }
    .week-nav { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; justify-content: center; }
    .week-nav h3 { font-size: 1rem; min-width: 250px; text-align: center; }
    /* Calendar */
    .calendar-nav { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; justify-content: center; }
    .calendar-nav h3 { font-size: 1.1rem; min-width: 200px; text-align: center; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .calendar-header { background: #f8f9fa; padding: 0.5rem; text-align: center; font-weight: 600; font-size: 0.82rem; color: #555; border-radius: 4px; }
    .calendar-day { background: #fff; border: 1px solid #eee; border-radius: 4px; min-height: 80px; padding: 0.4rem; position: relative; cursor: pointer; }
    .calendar-day .day-num { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.3rem; }
    .calendar-day.other-month { opacity: 0.4; }
    .calendar-day.today { border-color: #4a6cf7; }
    .calendar-day.blocked-date { background: #f3e8ff; border-color: #7c3aed; opacity: 0.85; }
    .assessment-badge { font-size: 0.72rem; padding: 0.15rem 0.3rem; border-radius: 3px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; gap: 2px; }
    .assessment-normal { background: #cce5ff; color: #004085; }
    .assessment-ponavljanje { background: #ffcccc; color: #8b0000; }
    .assessment-badge .del-asm { cursor: pointer; font-weight: 700; padding: 0 2px; opacity: 0.6; }
    .assessment-badge .del-asm:hover { opacity: 1; }
    .empty-calendar { text-align: center; padding: 2rem; color: #999; }
    .add-asm-btn { font-size: 0.7rem; color: #4a6cf7; cursor: pointer; opacity: 0.5; }
    .add-asm-btn:hover { opacity: 1; }
    /* Forms */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 2rem; width: 100%; max-width: 450px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
    .modal h3 { margin-bottom: 1rem; }
    .modal .form-group { margin-bottom: 0.8rem; }
    .modal label { display: block; font-size: 0.85rem; font-weight: 500; color: #555; margin-bottom: 0.2rem; }
    .modal select, .modal input { width: 100%; padding: 0.5rem 0.7rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
    .modal .form-actions { display: flex; gap: 0.5rem; justify-content: end; margin-top: 1rem; }
    .modal .btn-cancel { background: #6c757d; color: #fff; }
    .modal .btn-cancel:hover { background: #5a6268; }
    .modal .form-checkbox { display: flex; align-items: center; gap: 0.5rem; }
    .modal .form-checkbox input { width: auto; }
    .modal .form-checkbox label { margin: 0; }
    .msg { padding: 0.7rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
    .msg.error { display: block; background: #fee; color: #c00; }
    .msg.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .quick-add { display: inline-block; margin-top: 2px; }
    @media (max-width: 768px) {
      .calendar-grid { grid-template-columns: repeat(7, 1fr); font-size: 0.75rem; }
      .calendar-day { min-height: 60px; padding: 0.2rem; }
      .filters { flex-direction: column; }
      .filters select, .filters input { width: 100%; }
      .prostor-tabs { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <nav>
    <span class="brand">Šolski App</span>
    <a href="#" class="active" data-tab="rezervacije">Rezervacije</a>
    <a href="#" data-tab="ocenjevanja">Ocenjevanje</a>
    <a href="/auth/admin/users" id="admin-link" style="display:none;">Admin panel</a>
    <span class="spacer"></span>
    <span class="user-info" id="userInfo"></span>
    <a href="#" onclick="openChangePasswordModal(); return false;">Spremeni geslo</a>
    <a href="/auth/logout">Odjava</a>
  </nav>
  <div class="container">
    <div id="msg" class="msg"></div>
    <!-- ===== REZERVACIJE ===== -->
    <div id="section-rezervacije" class="section active">
      <div class="card">
        <h2>Rezervacije prostorov</h2>
        <div class="filters">
          <div>
            <label>Začetek tedna</label>
            <input type="date" id="rez-week-start">
          </div>
          <button class="btn btn-primary" onclick="loadAllReservations()">Osveži</button>
          <button class="btn btn-outline" onclick="openRezModal()">+ Nova rezervacija</button>
          <div id="series-buttons" style="display:none;">
            <button class="btn btn-outline" onclick="openWeeklySeriesModal()">📅 Tedenska serija</button>
            <button class="btn btn-outline" onclick="openFullDaySeriesModal()">☀️ Celodnevna serija</button>
          </div>
        </div>
        <div class="prostor-tabs" id="prostor-tabs"></div>
        <div id="rez-views-container"></div>
      </div>
    </div>
    <!-- ===== OCENJEVANJE ===== -->
    <div id="section-ocenjevanja" class="section">
      <div class="card">
        <h2>Ocenjevanja</h2>
        <div class="filters">
          <div>
            <label>Razred</label>
            <select id="oc-razred"></select>
          </div>
          <button class="btn btn-primary" onclick="loadAssessments()">Osveži</button>
          <button class="btn btn-outline" onclick="openOcModal()">+ Novo ocenjevanje</button>
          <span id="block-btn-container"><button class="btn btn-outline" onclick="openBlockModal()">🚫 Zasedeni datumi</button></span>
        </div>
        <div id="oc-calendar-container">
          <p style="text-align:center;color:#999;padding:2rem;">Nalaganje ...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== MODAL - Rezervacija ===== -->
  <div class="modal-overlay" id="rez-modal">
    <div class="modal">
      <h3>Nova rezervacija</h3>
      <div class="form-group">
        <label>Prostor</label>
        <select id="rez-form-prostor"></select>
      </div>
      <div class="form-group">
        <label>Datum</label>
        <input type="date" id="rez-form-date">
      </div>
      <div class="form-group">
        <label>Ura</label>
        <select id="rez-form-hour"></select>
      </div>
      <div class="form-group" id="rez-form-qty-group" style="display:none;">
        <label>Število tablic</label>
        <input type="number" id="rez-form-qty" min="1" max="28" value="1">
      </div>
      <div class="form-actions">
        <button class="btn btn-cancel" onclick="closeModal('rez-modal')">Prekliči</button>
        <button class="btn btn-primary" onclick="submitRezervacija()">Shrani</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL - Tedenska serija ===== -->
  <div class="modal-overlay" id="weekly-series-modal">
    <div class="modal" style="max-width:500px;">
      <h3>Tedenska ponavljajoča rezervacija</h3>
      <div class="form-group">
        <label>Prostor</label>
        <select id="weekly-prostor"></select>
      </div>
      <div class="form-group">
        <label>Ura (0-7)</label>
        <input type="number" id="weekly-hour" min="0" max="7" step="1" value="0">
      </div>
      <div class="form-group">
        <label>Dan v tednu (0=Pon, 6=Ned)</label>
        <input type="number" id="weekly-weekday" min="0" max="6" step="1" value="0">
      </div>
      <div class="form-group">
        <label>Od datuma</label>
        <input type="date" id="weekly-date-from">
      </div>
      <div class="form-group">
        <label>Do datuma</label>
        <input type="date" id="weekly-date-to">
      </div>
      <div class="form-group">
        <label>Razred (npr. 7a)</label>
        <input type="text" id="weekly-razred" placeholder="Izbirno">
      </div>
      <div class="form-group">
        <label>ID učitelja</label>
        <input type="number" id="weekly-teacher-id" value="1" step="1">
      </div>
      <div class="form-group" id="weekly-qty-group" style="display:none;">
        <label>Število tablic (samo za tablice)</label>
        <input type="number" id="weekly-qty" min="1" max="28" value="1">
      </div>
      <div class="form-checkbox">
        <input type="checkbox" id="weekly-skip-conflicts">
        <label>Preskoči konfliktne termine (namesto napake)</label>
      </div>
      <div class="form-actions">
        <button class="btn btn-cancel" onclick="closeModal('weekly-series-modal')">Prekliči</button>
        <button class="btn btn-primary" onclick="submitWeeklySeries()">Ustvari serijo</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL - Celodnevna serija ===== -->
  <div class="modal-overlay" id="fullday-series-modal">
    <div class="modal" style="max-width:500px;">
      <h3>Celodnevna serija (vse ure)</h3>
      <div class="form-group">
        <label>Prostor</label>
        <select id="fullday-prostor"></select>
      </div>
      <div class="form-group">
        <label>Od datuma</label>
        <input type="date" id="fullday-date-from">
      </div>
      <div class="form-group">
        <label>Do datuma</label>
        <input type="date" id="fullday-date-to">
      </div>
      <div class="form-group">
        <label>Razred (npr. 7a)</label>
        <input type="text" id="fullday-razred" placeholder="Izbirno">
      </div>
      <div class="form-group">
        <label>ID učitelja</label>
        <input type="number" id="fullday-teacher-id" value="1" step="1">
      </div>
      <div class="form-group" id="fullday-qty-group" style="display:none;">
        <label>Število tablic (samo za tablice)</label>
        <input type="number" id="fullday-qty" min="1" max="28" value="1">
      </div>
      <div class="form-group">
        <label>Ure (prazno za vse, npr. 0,1,2)</label>
        <input type="text" id="fullday-hours" placeholder="0,1,2">
      </div>
      <div class="form-checkbox">
        <input type="checkbox" id="fullday-skip-conflicts">
        <label>Preskoči konfliktne termine</label>
      </div>
      <div class="form-actions">
        <button class="btn btn-cancel" onclick="closeModal('fullday-series-modal')">Prekliči</button>
        <button class="btn btn-primary" onclick="submitFullDaySeries()">Ustvari serijo</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL - Ocenjevanje ===== -->
  <div class="modal-overlay" id="oc-modal">
    <div class="modal">
      <h3>Novo ocenjevanje</h3>
      <div class="form-group">
        <label>Razred</label>
        <select id="oc-form-razred"></select>
      </div>
      <div class="form-group">
        <label>Datum</label>
        <input type="date" id="oc-form-date">
      </div>
      <div class="form-checkbox">
        <input type="checkbox" id="oc-form-ponavljanje">
        <label for="oc-form-ponavljanje">Ponavljanje</label>
      </div>
      <div class="form-actions">
        <button class="btn btn-cancel" onclick="closeModal('oc-modal')">Prekliči</button>
        <button class="btn btn-primary" onclick="submitOcenjevanje()">Shrani</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL - Blocked Dates ===== -->
  <div class="modal-overlay" id="block-modal">
    <div class="modal" style="max-width:500px;">
      <h3>🚫 Zasedeni datumi</h3>
      <div class="form-group">
        <label>Razredi (držite Ctrl za več)</label>
        <select id="block-razredi" multiple style="height:180px;width:100%;"></select>
      </div>
      <div style="display:flex;gap:10px;">
        <div class="form-group" style="flex:1;">
          <label>Od datuma</label>
          <input type="date" id="block-date-from">
        </div>
        <div class="form-group" style="flex:1;">
          <label>Do datuma</label>
          <input type="date" id="block-date-to">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="addBlockedDates()">Dodaj zasedene datume</button>
        <button class="btn btn-cancel" onclick="closeModal('block-modal')">Zapri</button>
      </div>
      <div id="block-msg" style="margin-top:10px;font-size:0.9rem;"></div>
      <div id="block-list" style="margin-top:15px;max-height:250px;overflow-y:auto;"></div>
    </div>
  </div>

  <!-- ===== MODAL - Change Password ===== -->
  <div class="modal-overlay" id="pw-modal">
    <div class="modal" style="max-width:400px;">
      <h3>Sprememba gesla</h3>
      <div class="form-group">
        <label>Trenutno geslo</label>
        <input type="password" id="pw-old" placeholder="Vnesite trenutno geslo">
      </div>
      <div class="form-group">
        <label>Novo geslo</label>
        <input type="password" id="pw-new1" placeholder="Vnesite novo geslo">
        <small style="display:block;font-size:0.75rem;color:#666;margin-top:-5px;">Vsaj 5 znakov, mala/velika črka, številka</small>
      </div>
      <div class="form-group">
        <label>Novo geslo (ponovno)</label>
        <input type="password" id="pw-new2" placeholder="Ponovite novo geslo">
      </div>
      <div class="form-actions">
        <button class="btn btn-cancel" onclick="closeModal('pw-modal')">Prekliči</button>
        <button class="btn btn-primary" onclick="submitChangePassword()">Spremeni geslo</button>
      </div>
      <div id="pw-msg" style="margin-top:10px;font-size:0.9rem;"></div>
    </div>
  </div>

  <script>
    // Global state
    let schedule = {};
    let razredi = [];
    let prostori = [];
    let currentUser = null;
    let currentOcMonth = '';
    let currentOcRazred = '';
    let blockedDates = {};
    let allBlocked = [];
    let inactivityTimer = null;
    const INACTIVITY_TIMEOUT_MS = 60 * 60 * 1000;

    function resetInactivityTimer() {
      if (inactivityTimer) clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => { window.location.href = '/auth/logout'; }, INACTIVITY_TIMEOUT_MS);
    }

    document.addEventListener('click', resetInactivityTimer);
    document.addEventListener('mousemove', resetInactivityTimer);
    document.addEventListener('keydown', resetInactivityTimer);
    document.addEventListener('scroll', resetInactivityTimer);
    document.addEventListener('touchstart', resetInactivityTimer);

    document.addEventListener('DOMContentLoaded', async () => {
      const [schedRes, razRes, proRes, meRes] = await Promise.all([
        fetch('/api/schedule'), fetch('/api/razredi'), fetch('/api/prostori'), fetch('/auth/me')
      ]);
      schedule = await schedRes.json();
      razredi = await razRes.json();
      prostori = await proRes.json();
      if (meRes.ok) currentUser = await meRes.json();

      if (currentUser) {
        document.getElementById('userInfo').textContent = `${currentUser.full_name || currentUser.username} (${currentUser.role === 'admin' ? 'admin' : currentUser.role === 'vodstvo' ? 'vodstvo' : 'učitelj'})`;
        if (currentUser.role === 'admin') document.getElementById('admin-link').style.display = 'inline';

        const allowedIds = [1, 2, 3, 4];
        const allowedRoles = ['admin', 'vodstvo'];
        const btnContainer = document.getElementById('block-btn-container');
        if (allowedIds.includes(currentUser.id) || allowedRoles.includes(currentUser.role)) {
          btnContainer.style.display = 'inline';
        } else {
          btnContainer.style.display = 'none';
        }

        // Serijske rezervacije - samo za admin/vodstvo
        const seriesDiv = document.getElementById('series-buttons');
        if (currentUser.role === 'admin' || currentUser.role === 'vodstvo') {
          seriesDiv.style.display = 'inline-flex';
          seriesDiv.style.gap = '0.5rem';
        }
      }

      populateSelect('rez-form-prostor', prostori);
      populateSelect('weekly-prostor', prostori);
      populateSelect('fullday-prostor', prostori);
      populateOcRazredi('oc-razred', razredi, true);
      populateOcRazredi('oc-form-razred', razredi);
      populateHours('rez-form-hour');

      const monday = getMonday(new Date());
      document.getElementById('rez-week-start').value = formatDate(monday);

      const tabsHtml = prostori.map(p => `<div class="prostor-tab${p === prostori[0] ? ' active' : ''}" data-prostor="${p}" onclick="switchProstor('${p}')">${prostorLabel(p)}</div>`).join('');
      document.getElementById('prostor-tabs').innerHTML = tabsHtml;

      const viewsHtml = prostori.map(p => `<div class="prostor-view${p === prostori[0] ? ' active' : ''}" id="prostor-view-${p}"><div class="rez-table-inner"><p style="text-align:center;color:#999;padding:2rem;">Nalaganje ...</p></div></div>`).join('');
      document.getElementById('rez-views-container').innerHTML = viewsHtml;

      document.querySelectorAll('nav a[data-tab]').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          document.querySelectorAll('nav a[data-tab]').forEach(x => x.classList.remove('active'));
          a.classList.add('active');
          document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
          document.getElementById('section-' + a.dataset.tab).classList.add('active');
          if (a.dataset.tab === 'rezervacije') loadAllReservations();
          if (a.dataset.tab === 'ocenjevanja') loadAssessments();
        });
      });

      document.getElementById('rez-form-prostor').addEventListener('change', e => {
        document.getElementById('rez-form-qty-group').style.display = e.target.value === 'tablice' ? 'block' : 'none';
      });
      document.getElementById('rez-form-prostor').dispatchEvent(new Event('change'));

      // Series qty toggles
      const weeklyProstor = document.getElementById('weekly-prostor');
      const fulldayProstor = document.getElementById('fullday-prostor');
      weeklyProstor.addEventListener('change', () => {
        document.getElementById('weekly-qty-group').style.display = weeklyProstor.value === 'tablice' ? 'block' : 'none';
      });
      fulldayProstor.addEventListener('change', () => {
        document.getElementById('fullday-qty-group').style.display = fulldayProstor.value === 'tablice' ? 'block' : 'none';
      });

      loadAllReservations();
      currentOcMonth = new Date().getFullYear() + '-' + String(new Date().getMonth() + 1).padStart(2, '0');
      loadAllBlockedDates();
      loadAssessments();
    });

    // === Helpers ===
    function prostorLabel(p) {
      const labels = {tablice: 'Tablice', racunalnica: 'Računalnica', ladja: 'Ladja'};
      return labels[p] || p;
    }
    function getMonday(d) { const date = new Date(d); const day = date.getDay(); const diff = (day === 0) ? 6 : day - 1; date.setDate(date.getDate() - diff); date.setHours(0,0,0,0); return date; }
    function formatDate(d) { const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0'); return `${y}-${m}-${day}`; }
    function formatDateSI(d) { const dd = String(d.getDate()).padStart(2,'0'); const mm = String(d.getMonth()+1).padStart(2,'0'); const yyyy = d.getFullYear(); return `${dd}/${mm}/${yyyy}`; }
    function monthName(m) { const names = ['Januar','Februar','Marec','April','Maj','Junij','Julij','Avgust','September','Oktober','November','December']; return names[m]; }
    function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
    function populateSelect(id, items) { const sel = document.getElementById(id); sel.innerHTML = items.map(v => `<option value="${v}">${v}</option>`).join(''); }
    function populateOcRazredi(id, items, addAll) {
      const sel = document.getElementById(id);
      const osmice = items.filter(r => r.startsWith('8.')).sort();
      const devetke = items.filter(r => r.startsWith('9.')).sort();
      const ostalo = items.filter(r => !r.startsWith('8.') && !r.startsWith('9.')).sort();
      let html = '';
      if (addAll) html += '<option value="">Vsi razredi</option>';
      if (id === 'oc-razred') {
        html += '<option value="__8__">🗂️ 8. razred (vsi)</option>';
        html += '<option value="__9__">🗂️ 9. razred (vsi)</option>';
        html += '<option value="" disabled style="font-size:1px;">—</option>';
      }
      ostalo.forEach(r => { html += `<option value="${r}">${r}</option>`; });
      if (osmice.length) { if (id !== 'oc-razred') html += '<option value="" disabled style="font-weight:bold;background:#eee;">— 8. razred —</option>'; osmice.forEach(r => html += `<option value="${r}">${r}</option>`); }
      if (devetke.length) { if (id !== 'oc-razred') html += '<option value="" disabled style="font-weight:bold;background:#eee;">— 9. razred —</option>'; devetke.forEach(r => html += `<option value="${r}">${r}</option>`); }
      sel.innerHTML = html;
    }
    function populateHours(id) { const sel = document.getElementById(id); sel.innerHTML = Object.entries(schedule).map(([k,v]) => `<option value="${k}">${k}: ${v}</option>`).join(''); }
    function showMsg(msg, type) { const el = document.getElementById('msg'); el.textContent = msg; el.className = 'msg ' + type; setTimeout(() => { el.className = 'msg'; }, 5000); }
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    // === Series functions ===
    function openWeeklySeriesModal() {
      document.getElementById('weekly-prostor').value = prostori[0] || '';
      document.getElementById('weekly-hour').value = '0';
      document.getElementById('weekly-weekday').value = '0';
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('weekly-date-from').value = today;
      const nextMonth = new Date(); nextMonth.setMonth(nextMonth.getMonth() + 3);
      document.getElementById('weekly-date-to').value = nextMonth.toISOString().split('T')[0];
      document.getElementById('weekly-razred').value = '';
      document.getElementById('weekly-teacher-id').value = currentUser ? currentUser.id : 1;
      document.getElementById('weekly-qty').value = '1';
      document.getElementById('weekly-skip-conflicts').checked = false;
      openModal('weekly-series-modal');
    }

    async function submitWeeklySeries() {
      const prostor = document.getElementById('weekly-prostor').value;
      const data = {
        prostor: prostor,
        hour: parseInt(document.getElementById('weekly-hour').value),
        weekday: parseInt(document.getElementById('weekly-weekday').value),
        date_from: document.getElementById('weekly-date-from').value,
        date_to: document.getElementById('weekly-date-to').value,
        razred: document.getElementById('weekly-razred').value || null,
        teacher_id: parseInt(document.getElementById('weekly-teacher-id').value),
        skip_conflicts: document.getElementById('weekly-skip-conflicts').checked,
      };
      if (prostor === 'tablice') data.qty = parseInt(document.getElementById('weekly-qty').value) || 1;
      try {
        const res = await fetch('/api/rezervacije/series/weekly', { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(data) });
        const json = await res.json();
        if (res.ok) { showMsg(`Serija ustvarjena (${json.created} terminov). Preskočeni: ${json.skipped?.length || 0}`, 'success'); closeModal('weekly-series-modal'); loadAllReservations(); }
        else { showMsg(json.detail || 'Napaka pri ustvarjanju serije.', 'error'); }
      } catch(e) { showMsg('Napaka pri povezavi s strežnikom.', 'error'); }
    }

    function openFullDaySeriesModal() {
      document.getElementById('fullday-prostor').value = prostori[0] || '';
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('fullday-date-from').value = today;
      const nextWeek = new Date(); nextWeek.setDate(nextWeek.getDate() + 7);
      document.getElementById('fullday-date-to').value = nextWeek.toISOString().split('T')[0];
      document.getElementById('fullday-razred').value = '';
      document.getElementById('fullday-teacher-id').value = currentUser ? currentUser.id : 1;
      document.getElementById('fullday-qty').value = '1';
      document.getElementById('fullday-hours').value = '';
      document.getElementById('fullday-skip-conflicts').checked = false;
      openModal('fullday-series-modal');
    }

    async function submitFullDaySeries() {
      const prostor = document.getElementById('fullday-prostor').value;
      let hours = document.getElementById('fullday-hours').value;
      let hoursArray = null;
      if (hours && hours.trim() !== '') { hoursArray = hours.split(',').map(h => parseInt(h.trim())).filter(n => !isNaN(n)); }
      const data = {
        prostor: prostor,
        date_from: document.getElementById('fullday-date-from').value,
        date_to: document.getElementById('fullday-date-to').value,
        razred: document.getElementById('fullday-razred').value || null,
        teacher_id: parseInt(document.getElementById('fullday-teacher-id').value),
        skip_conflicts: document.getElementById('fullday-skip-conflicts').checked,
      };
      if (prostor === 'tablice') data.qty = parseInt(document.getElementById('fullday-qty').value) || 1;
      if (hoursArray && hoursArray.length > 0) data.hours = hoursArray;
      try {
        const res = await fetch('/api/rezervacije/series/full-day', { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(data) });
        const json = await res.json();
        if (res.ok) { showMsg(`Celodnevna serija ustvarjena (${json.created} terminov). Preskočeni: ${json.skipped?.length || 0}`, 'success'); closeModal('fullday-series-modal'); loadAllReservations(); }
        else { showMsg(json.detail || 'Napaka pri ustvarjanju serije.', 'error'); }
      } catch(e) { showMsg('Napaka pri povezavi s strežnikom.', 'error'); }
    }
