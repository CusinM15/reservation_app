apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sola-app-hpa
  namespace: sola-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sola-app
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # wait 5 min before scaling down
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60   # scale up quickly
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
